name: Sync versions from Vercel

on:
  schedule:
    # Daily at 9am CST (3pm UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ['Storybook versioned deploy']
    types: [completed]

jobs:
  sync-versions:
    name: Sync versions.json from Vercel prod deployments
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Same token as publish.yml — GITHUB_TOKEN cannot push to protected main.
      - name: Create GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.GH_BYPASS_APP_ID }}
          private-key: ${{ secrets.GH_BYPASS_APP_SECRET }}

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Node environment
        uses: ./.github/actions/configure-workflow-node-environment

      - name: Sync versions from Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_SYNC_TARGET: stage
        run: node packages/design-system/scripts/sync-versions-from-vercel.js

      - name: Commit and push if changed
        run: |
          git config user.name "ci-branch-protection-bypass[bot]"
          git config user.email "ci-branch-protection-bypass[bot]@users.noreply.github.com"
          git add packages/design-system/.storybook/versions.json
          if git diff --staged --quiet; then
            echo "No change to versions.json"
          else
            git commit -m "chore(storybook): sync versions from Vercel prod deployments"
            git push origin main
          fi
