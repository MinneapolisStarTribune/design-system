name: Publish Design System

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. v1.2.3). Required when run manually; ignored when triggered by a release.'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.GH_BYPASS_APP_ID }}
          private-key: ${{ secrets.GH_BYPASS_APP_SECRET }}

      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Validate Tag Format
        uses: ./.github/actions/validate-tag-format
        with:
          tag: ${{ github.event.release.tag_name || github.event.inputs.version }}

      - name: Set up Node with authentication
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@minneapolisstartribune'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Run release verification gates (web + native + a11y)
        run: yarn workspace @minneapolisstartribune/design-system release:verify

      - name: Extract version from tag or input
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.version }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Generate component matrix
        working-directory: packages/design-system
        run: yarn generate:component-matrix

      - name: Commit component matrix if changed
        env:
          HUSKY: 0
        run: |
          git config user.name "ci-branch-protection-bypass[bot]"
          git config user.email "ci-branch-protection-bypass[bot]@users.noreply.github.com"

          # Ensure we're on main branch and up to date
          git checkout main
          git fetch origin main

          git add packages/design-system/src/stories/GettingStarted/component-matrix.json
          if git diff --cached --quiet; then
            echo "Component matrix unchanged."
          else
            git commit -m "chore: update component matrix"
            git push origin main
          fi

      - name: Update package.json version
        env:
          HUSKY: 0
        run: |

          # Update version in the design system package
          cd packages/design-system
          yarn version ${{ steps.version.outputs.version }} --immediate
          cd ../..

          # Compute next minor and patch versions for runbook examples
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEXT_MINOR="${MAJOR}.$((MINOR + 1)).0"
          NEXT_PATCH="${MAJOR}.${MINOR}.$((PATCH + 1))"

          # HTML: current version pill
          sed -i "s/v[0-9]*\.[0-9]*\.[0-9]* current/v${VERSION} current/" docs/release-runbook.html
          # HTML: release type card examples
          sed -i "s/e\.g\. v[0-9]*\.[0-9]*\.[0-9]* → v[0-9]*\.[0-9]*\.0/e.g. v${VERSION} → v${NEXT_MINOR}/g" docs/release-runbook.html
          sed -i "s/e\.g\. v[0-9]*\.[0-9]*\.[0-9]* → v[0-9]*\.[0-9]*\.[1-9][0-9]*/e.g. v${VERSION} → v${NEXT_PATCH}/g" docs/release-runbook.html

          # MD: current version
          sed -i "s|\*\*Current version:\*\* \`v[0-9]*\.[0-9]*\.[0-9]*\`|**Current version:** \`v${VERSION}\`|" docs/release-runbook.md
          # MD: release type table examples
          sed -i "s|\`v[0-9]*\.[0-9]*\.[0-9]* → v[0-9]*\.[0-9]*\.0\`|\`v${VERSION} → v${NEXT_MINOR}\`|g" docs/release-runbook.md
          sed -i "s|\`v[0-9]*\.[0-9]*\.[0-9]* → v[0-9]*\.[0-9]*\.[1-9][0-9]*\`|\`v${VERSION} → v${NEXT_PATCH}\`|g" docs/release-runbook.md

          git add packages/design-system/package.json docs/release-runbook.html docs/release-runbook.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"

          # Push to main
          git push origin main

      - name: Install dependencies (after version bump)
        run: yarn install

      - name: Build package
        run: yarn workspace @minneapolisstartribune/design-system build

      - name: Publish to GitHub Packages
        working-directory: packages/design-system
        run: yarn npm publish
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}
