name: Publish Design System

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3). Required when run manually; ignored when triggered by a release.'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node with authentication
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@minneapolisstartribune'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Extract version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "${{ github.event.inputs.version }}" ]; then
              echo "::error::When running manually, you must provide the 'version' input (e.g. 1.2.3)."
              exit 1
            fi
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Update package.json version
        env:
          HUSKY: 0
        run: |
          # Ensure we're on main branch and up to date
          git checkout main
          git fetch origin main
          git reset --hard origin/main

          # Update version in the design system package
          cd packages/design-system
          yarn version ${{ steps.version.outputs.version }} --immediate
          cd ../..

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/design-system/package.json
          git commit --no-verify -m "chore: bump version to ${{ steps.version.outputs.version }}"

          # Push to main
          git push origin main

      - name: Install dependencies (after version bump)
        run: yarn install

      - name: Build package
        run: yarn workspace @minneapolisstartribune/design-system build

      - name: Publish to GitHub Packages
        working-directory: packages/design-system
        run: yarn npm publish
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}
