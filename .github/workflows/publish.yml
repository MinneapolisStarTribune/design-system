name: Publish Design System

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node with authentication
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@minneapolisstartribune'

      - name: Install dependencies
        run: yarn install

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Update package.json version
        env:
          HUSKY: 0
        run: |
          # Ensure we're on main branch and up to date
          git checkout main
          git fetch origin main
          git reset --hard origin/main
          
          # Update version in the design system package
          cd packages/design-system
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          cd ../..

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/design-system/package.json
          git commit --no-verify -m "chore: bump version to ${{ steps.version.outputs.version }}"

          # Push to main
          git push origin main

      - name: Build package
        run: yarn workspace @minneapolisstartribune/design-system build

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}
        working-directory: packages/design-system
        run: yarn publish --non-interactive
