name: Lint

on:
  workflow_call:
  pull_request:
    branches: [main, 'release/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Node environment
        uses: ./.github/actions/configure-workflow-node-environment

      - name: Run ESLint
        run: yarn workspace @minneapolisstartribune/design-system lint

      - name: Check formatting
        run: yarn workspace @minneapolisstartribune/design-system format:check

      - name: Type check
        run: yarn workspace @minneapolisstartribune/design-system typecheck
