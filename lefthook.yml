# Pre-push: format check, then regenerate component matrix (commits if needed and aborts push once)
pre-push:
  parallel: false
  commands:
    format-check:
      run: yarn format:check
    # Lefthook runs from repo root. Commits matrix if generator changed it, then fails push once so you push again.
    component-matrix:
      run: |
        yarn workspace @minneapolisstartribune/design-system generate:component-matrix
        m=packages/design-system/src/stories/GettingStarted/component-matrix.json
        if git diff --quiet HEAD -- "$m"; then exit 0; fi
        git add -- "$m" && git commit -m "chore: Update component matrix"
        echo "" >&2
        echo "There were updates to the component matrix. Changes were committed; run git push again." >&2
        exit 1 # Non-zero stops this push; push again so the new commit is included.

# Pre-commit: fix staged files (prettier, eslint), then typecheck and vitest
pre-commit:
  parallel: false
  commands:
    # Run from repo root so {staged_files} paths (root-relative) resolve correctly
    prettier:
      glob: 'packages/design-system/**/*.{ts,tsx,json,md,css}'
      run: node ./node_modules/.bin/prettier --write {staged_files}
    eslint:
      glob: 'packages/design-system/**/*.{ts,tsx}'
      run: node ./node_modules/.bin/eslint --fix --max-warnings 0 {staged_files}
    # Re-stage fixed files so the commit includes Prettier/ESLint changes
    restage:
      glob: 'packages/design-system/**/*.{ts,tsx,json,md,css}'
      run: git add {staged_files}
    # Typecheck without turbo so output is just tsc errors (no turbo wrapper).
    # Only design-system has a typecheck script; hook runs when design-system TS files are staged.
    typecheck:
      glob: 'packages/design-system/**/*.{ts,tsx}'
      run: yarn workspace @minneapolisstartribune/design-system typecheck
    vitest:
      glob: 'packages/design-system/src/**/*.{ts,tsx}'
      exclude: 'packages/design-system/src/**/*.native.{tsx,ts}'
      root: packages/design-system
      run: VITEST_REPORTERS=./scripts/minimal-reporter.ts yarn vitest related --run --passWithNoTests --no-color {staged_files}
    jest:
      glob: 'packages/design-system/src/**/*.native.{tsx,ts}'
      root: packages/design-system
      run: yarn tokens >/dev/null && yarn jest --config jest.config.js --findRelatedTests --passWithNoTests {staged_files}
